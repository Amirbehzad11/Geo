services:

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    networks:
      - geo_net
    volumes:
      - redis_data:/data
    command: >
      redis-server
        --appendonly yes
        --maxmemory 2gb
        --maxmemory-policy allkeys-lru
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  postgres:
    image: postgis/postgis:16-3.4-alpine
    restart: unless-stopped
    networks:
      - geo_net
    ports:
      - "5433:5432"
    environment:
      POSTGRES_USER: geo
      POSTGRES_PASSWORD: geo_secret
      POSTGRES_DB: geodb
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U geo -d geodb"]
      interval: 5s
      timeout: 3s
      retries: 10

  # ── OSRM — self-hosted routing engine ─────────────────────────────────────
  #
  # Algorithm choice: MLD (Multi-Level Dijkstra)
  #   • CH  (Contraction Hierarchies) is marginally faster per query but
  #     requires a full re-contract when the map changes (hours for Iran).
  #   • MLD supports live traffic updates and incremental customization
  #     (osrm-customize re-runs in minutes after a map update).
  #   → MLD is the right choice for a production service that needs regular
  #     map refreshes without prolonged downtime.
  #
  # Prerequisites — run ONCE before `docker compose up`:
  #
  #   mkdir -p ./data
  #   # Place your Iran OSM extract here:
  #   #   wget -O ./data/map.osm.pbf https://download.geofabrik.de/asia/iran-latest.osm.pbf
  #
  #   # 1. Extract the road network (choose profile: car.lua / foot.lua)
  #   docker run --rm -v $(pwd)/data:/data osrm/osrm-backend:latest \
  #     osrm-extract -p /opt/car.lua /data/map.osm.pbf
  #
  #   # 2. Partition the graph for MLD
  #   docker run --rm -v $(pwd)/data:/data osrm/osrm-backend:latest \
  #     osrm-partition /data/map.osrm
  #
  #   # 3. Customize (weight cells — fast, run after any map update)
  #   docker run --rm -v $(pwd)/data:/data osrm/osrm-backend:latest \
  #     osrm-customize /data/map.osrm
  #
  # After that, `docker compose up osrm` starts the HTTP server.
  #
  # Resource expectations (128 GB RAM):
  #   • Iran graph: ~2–3 GB RAM after extract (car profile)
  #   • osrm-routed idle: ~3 GB; under load: up to 8 GB
  #   • Throughput: 10 000+ queries/second at < 5 ms p99 (MLD, car)
  #
  osrm:
    image: osrm/osrm-backend:latest
    restart: unless-stopped
    networks:
      - geo_net
    ports:
      - "5000:5000"
    volumes:
      - ./data:/data
    # Run with MLD algorithm; adjust thread count to your CPU core count.
    command: >
      osrm-routed
        --algorithm=MLD
        --max-table-size=10000
        --max-matching-size=100
        /data/map.osrm
    # OSRM does not expose a built-in health check endpoint. The geo-service
    # treats any connection error as a temporary failure and falls back to the
    # internal A* engine automatically — so it is safe to start geo-service
    # even before OSRM finishes loading.
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:5000/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    profiles:
      - osrm  # opt-in: only started when COMPOSE_PROFILES=osrm

  geo-service:
    build: .
    restart: unless-stopped
    networks:
      - geo_net
    ports:
      - "8080:8080"
    environment:
      PORT: "8080"
      GIN_MODE: "release"

      # Redis
      REDIS_ADDR: "redis:6379"
      REDIS_PASSWORD: ""
      REDIS_DB: "0"

      # PostGIS (comment out to disable)
      POSTGRES_DSN: "host=postgres port=5432 user=geo password=geo_secret dbname=geodb sslmode=disable"

      # Internal routing engine
      AVG_SPEED_KMH: "40"
      ROAD_GRAPH_LOAD_TIMEOUT_SEC: "300"
      INTERNAL_GRAPH_ENABLED: "${INTERNAL_GRAPH_ENABLED:-true}"
      INTERNAL_GRAPH_LAZY_LOAD: "${INTERNAL_GRAPH_LAZY_LOAD:-false}"
      INTERNAL_GRAPH_REQUIRED: "${INTERNAL_GRAPH_REQUIRED:-true}"

      # Routing backend selection
      # Set ROUTING_BACKEND=osrm to use OSRM as the primary engine (recommended
      # for production). For OSRM-primary production without the large in-process
      # graph, run with:
      #   COMPOSE_PROFILES=osrm ROUTING_BACKEND=osrm INTERNAL_GRAPH_ENABLED=false docker compose up -d
      ROUTING_BACKEND: "${ROUTING_BACKEND:-internal}"
      OSRM_BASE_URL: "http://osrm:5000"
      ROUTING_TIMEOUT_MS: "30000"       # 30 s per routing call on the full Iran graph
      ROUTING_MAX_IN_FLIGHT: "${ROUTING_MAX_IN_FLIGHT:-100}" # total route requests
      INTERNAL_ROUTING_MAX_IN_FLIGHT: "${INTERNAL_ROUTING_MAX_IN_FLIGHT:-4}"
      OSRM_ROUTING_MAX_IN_FLIGHT: "${OSRM_ROUTING_MAX_IN_FLIGHT:-100}"
      ROUTING_QUEUE_TIMEOUT_MS: "${ROUTING_QUEUE_TIMEOUT_MS:-1000}" # wait time for a free slot (ms)
      ROUTING_YEN_SPUR_CAP: "60"        # max spur nodes per Yen's iteration (0 = unlimited)
      ROUTING_MAX_ALTERNATIVES: "${ROUTING_MAX_ALTERNATIVES:-1}"
      ROUTE_CACHE_PRECISION: "${ROUTE_CACHE_PRECISION:-5}"

      # GPS processing
      GPS_RATE_LIMIT_MS: "3000"
      DEVIATION_THRESH_KM: "0.05"

      # Batch writer
      BATCH_SIZE: "500"
      BATCH_FLUSH_SEC: "2"

      # Direct read-only Laravel database access for /ws/shipments/nearby
      SHIPMENT_DB_DRIVER: "postgres"
      SHIPMENT_DB_DSN: "${SHIPMENT_DB_DSN:-}"
      SHIPMENT_TABLE: "shipments"
      SHIPMENT_ORIGIN_LOCATION_COLUMN: "start_location"
      SHIPMENT_END_LOCATION_COLUMN: "end_location"
      SHIPMENT_SEARCH_RADIUS_KM: "2"
      SHIPMENT_SEARCH_LIMIT: "100"

      VEHICLE_TYPES_TABLE:         "vehicle_types"
      VEHICLE_TYPE_LABEL_COLUMN:   "label"
      VEHICLE_TYPE_TITLE_COLUMN:    "title"

      # Content types — joins content_types on content_type_id to add content_image
      CONTENT_TYPES_TABLE:         "content_types"
      CONTENT_TYPE_ID_COLUMN:      "content_type_id"
      CONTENT_TYPE_IMAGE_COLUMN:   "image"

      # Shipment package images — adds images[] to nearby shipment responses
      SHIPMENT_IMAGES_TABLE:              "shipment_images"
      SHIPMENT_IMAGE_SHIPMENT_ID_COLUMN:  "shipment_id"
      SHIPMENT_IMAGE_COLUMN:              "image"

      # Driver location search
      DRIVER_GEO_KEY:              "drivers:geo"
      DRIVER_LOCATION_STREAM_KEY:  "driver:locations:stream"
      DRIVER_SEARCH_RADIUS_KM:     "20"

      # Public API settings
      # Set this to your Laravel/frontend origin in production, for example:
      # CORS_ALLOWED_ORIGINS: "https://app.example.com"
      CORS_ALLOWED_ORIGINS: "${CORS_ALLOWED_ORIGINS:-http://localhost:8000,http://localhost:5173}"
      API_KEY_ENABLED: "${API_KEY_ENABLED:-false}"
      API_KEY: "${API_KEY:-}"
      JWT_AUTH_ENABLED: "${JWT_AUTH_ENABLED:-true}"
      JWT_SECRET: "${JWT_SECRET:-}"
      JWT_ALGO: "${JWT_ALGO:-HS256}"
      WEBSOCKET_AUTH_ENABLED: "${WEBSOCKET_AUTH_ENABLED:-false}"
      WS_SHIPMENT_REQUIRE_TLS: "${WS_SHIPMENT_REQUIRE_TLS:-false}"
      WS_SHIPMENT_AUTH_REQUIRED: "${WS_SHIPMENT_AUTH_REQUIRED:-true}"
      WS_SHIPMENT_LEGACY_FORMAT: "${WS_SHIPMENT_LEGACY_FORMAT:-true}"
      RATE_LIMIT_PER_MINUTE: "${RATE_LIMIT_PER_MINUTE:-300}"
      REQUEST_BODY_LIMIT_BYTES: "${REQUEST_BODY_LIMIT_BYTES:-1048576}"
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy

  # Continuous driver location simulator — updates existing Redis GEO members.
  # Enable with: docker compose --profile sim up -d
  sim-drivers:
    build:
      context: .
      dockerfile: Dockerfile.sim-drivers
    restart: unless-stopped
    mem_limit: 64m
    networks:
      - geo_net
    depends_on:
      redis:
        condition: service_healthy
    environment:
      REDIS_ADDR: redis:6379
      DRIVER_GEO_KEY: drivers:geo
      SIM_DRIVER_COUNT: "1"
      SIM_DRIVER_ID_START: "27"
      SIM_DRIVER_CITY: isfahan
      SIM_DRIVER_WORKERS: "4"
    command:
      - -redis=redis:6379
      - -city=isfahan
      - -count=1
      - -id-start=27
      - -anchor-lat=32.646625
      - -anchor-lng=51.664761
      - -workers=4
      - -tick=5s
      - -batch-size=100
      - -min-move-m=10
      - -active-ratio=0.1
      - -keepalive-sec=90
      - -reset-geo
    profiles:
      - sim

  # Simulates passenger GPS along a fixed route and posts to /gps/update.
  # Requires API_KEY_ENABLED=true (or JWT for trip owner) on geo-service.
  # Enable with: docker compose --profile sim up -d --build sim-passenger
  sim-passenger:
    build:
      context: .
      dockerfile: Dockerfile.sim-passenger
    restart: unless-stopped
    mem_limit: 32m
    networks:
      - geo_net
    depends_on:
      - geo-service
    command:
      - -base=http://geo-service:8080
      - -trip=4
      - -speed-kmh=45
      - -tick=4s
      - -pause=3s
      - -start-lat=32.673130
      - -start-lng=51.633027
      - -pickup-lat=32.562882
      - -pickup-lng=51.753255
      - -dest-lat=32.796752
      - -dest-lng=51.749825
      - -loop
    profiles:
      - sim

networks:
  geo_net:
    driver: bridge

volumes:
  redis_data:
  pg_data:
