basePath: /
definitions:
  geo-service_internal_response.ErrorDetail:
    properties:
      code:
        type: string
      message:
        type: string
    type: object
  geo-service_internal_response.Failure:
    properties:
      error:
        $ref: '#/definitions/geo-service_internal_response.ErrorDetail'
      success:
        type: boolean
    type: object
  geo-service_internal_response.Success:
    properties:
      data: {}
      success:
        type: boolean
    type: object
  internal_gps.GPSUpdate:
    properties:
      lat:
        type: number
      lng:
        type: number
      timestamp:
        description: Unix seconds
        type: integer
      trip_id:
        type: integer
    type: object
  internal_gps.LocationState:
    properties:
      deviation_km:
        description: distance from planned route
        type: number
      lat:
        type: number
      lng:
        type: number
      speed_kmh:
        type: number
      timestamp:
        type: integer
      trip_id:
        type: integer
    type: object
  internal_route.MultiRouteLeg:
    properties:
      distance_km:
        type: number
      duration_min:
        type: number
      from:
        $ref: '#/definitions/internal_route.Waypoint'
      to:
        $ref: '#/definitions/internal_route.Waypoint'
    type: object
  internal_route.MultiRouteRequest:
    properties:
      mode:
        type: string
      trip_id:
        type: integer
      waypoints:
        description: at least 2; first is the start
        items:
          $ref: '#/definitions/internal_route.Waypoint'
        type: array
    type: object
  internal_route.MultiRouteResponse:
    properties:
      legs:
        items:
          $ref: '#/definitions/internal_route.MultiRouteLeg'
        type: array
      mode:
        type: string
      polyline:
        description: combined path
        type: string
      total_distance_km:
        type: number
      total_duration_min:
        type: number
    type: object
  internal_route.RouteInstruction:
    properties:
      distance_km:
        type: number
      duration_min:
        type: number
      index:
        type: integer
      location:
        $ref: '#/definitions/internal_route.RoutePoint'
      modifier:
        type: string
      street_name:
        type: string
      text:
        type: string
      type:
        type: string
    type: object
  internal_route.RouteLeg:
    properties:
      distance_km:
        type: number
      duration_min:
        type: number
      instructions:
        items:
          $ref: '#/definitions/internal_route.RouteInstruction'
        type: array
      mode:
        type: string
      polyline:
        type: string
    type: object
  internal_route.RouteOption:
    properties:
      distance_km:
        type: number
      duration_min:
        type: number
      id:
        type: integer
      instructions:
        items:
          $ref: '#/definitions/internal_route.RouteInstruction'
        type: array
      is_primary:
        type: boolean
      mode:
        type: string
      polyline:
        type: string
    type: object
  internal_route.RoutePoint:
    properties:
      lat:
        type: number
      lng:
        type: number
    type: object
  internal_route.RouteRequest:
    properties:
      alternatives:
        description: requested route count, clamped server-side
        type: integer
      end_lat:
        type: number
      end_lng:
        type: number
      mode:
        description: 'car | motorcycle | bus | walking | airplane (default: car)'
        type: string
      start_lat:
        type: number
      start_lng:
        type: number
      trip_id:
        description: optional
        type: integer
      vehicle_type:
        description: alias for mode, useful for Laravel payloads
        type: string
    type: object
  internal_route.RouteResponse:
    properties:
      distance:
        description: Backward-compatible primary route fields.
        type: number
      duration:
        description: minutes
        type: number
      legs:
        description: |-
          Legs is populated for multi-modal routes (e.g. train mode).
          Each leg has its own mode, polyline, and instructions.
        items:
          $ref: '#/definitions/internal_route.RouteLeg'
        type: array
      mode:
        type: string
      polyline:
        description: Google Encoded Polyline (combined for multi-modal)
        type: string
      primary:
        $ref: '#/definitions/internal_route.RouteOption'
    type: object
  internal_route.Waypoint:
    properties:
      label:
        description: optional human-readable name
        type: string
      lat:
        type: number
      lng:
        type: number
    type: object
host: localhost:8080
info:
  contact:
    name: GitHub Issues
    url: https://github.com/Amirbehzad11/geo-service/issues
  description: A production-ready geospatial routing microservice. Supports self-hosted
    OSRM (default) with an automatic in-process A* + Yen's k-shortest-paths fallback,
    live GPS tracking, WebSocket event delivery, and a PostGIS-backed OSM road graph.
  license:
    name: MIT
    url: https://opensource.org/licenses/MIT
  title: geo-service
  version: "1.0"
paths:
  /gps/trip/{id}/location:
    get:
      description: Returns the most recent GPS state for a trip, read from Redis.
        State is cached for 24 hours after the last update.
      parameters:
      - description: Trip ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: Latest location state
          schema:
            allOf:
            - $ref: '#/definitions/geo-service_internal_response.Success'
            - properties:
                data:
                  $ref: '#/definitions/internal_gps.LocationState'
              type: object
        "400":
          description: Invalid trip ID
          schema:
            $ref: '#/definitions/geo-service_internal_response.Failure'
        "404":
          description: No location found for this trip
          schema:
            $ref: '#/definitions/geo-service_internal_response.Failure'
      summary: Get latest trip location
      tags:
      - gps
  /gps/update:
    post:
      consumes:
      - application/json
      description: Accepts a raw GPS position for an active trip. Applies rate limiting,
        EMA smoothing (α=0.75), speed computation, and cross-track deviation detection
        against the planned route. Writes state to Redis and broadcasts events via
        Redis Pub/Sub.
      parameters:
      - description: GPS update payload
        in: body
        name: update
        required: true
        schema:
          $ref: '#/definitions/internal_gps.GPSUpdate'
      produces:
      - application/json
      responses:
        "200":
          description: Processed location state
          schema:
            allOf:
            - $ref: '#/definitions/geo-service_internal_response.Success'
            - properties:
                data:
                  $ref: '#/definitions/internal_gps.LocationState'
              type: object
        "400":
          description: Malformed JSON body
          schema:
            $ref: '#/definitions/geo-service_internal_response.Failure'
        "422":
          description: Validation error
          schema:
            $ref: '#/definitions/geo-service_internal_response.Failure'
        "429":
          description: Rate limited — update received too soon
          schema:
            $ref: '#/definitions/geo-service_internal_response.Failure'
        "500":
          description: Internal processing error
          schema:
            $ref: '#/definitions/geo-service_internal_response.Failure'
      summary: Process a GPS update
      tags:
      - gps
  /health:
    get:
      description: Returns the service health status and the reachability of each
        downstream dependency. Returns HTTP 503 when any required dependency is unreachable.
      produces:
      - application/json
      responses:
        "200":
          description: All dependencies healthy
          schema:
            $ref: '#/definitions/geo-service_internal_response.Success'
        "503":
          description: One or more dependencies unreachable
          schema:
            $ref: '#/definitions/geo-service_internal_response.Failure'
      summary: Health check
      tags:
      - system
  /route:
    post:
      consumes:
      - application/json
      description: Computes the fastest route between two coordinates. Uses the configured
        routing backend (OSRM or internal A*), with automatic fallback to the internal
        engine when the primary backend is unavailable. Falls back to a straight Haversine
        estimate when endpoints lie outside graph coverage.
      parameters:
      - description: Route request
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/internal_route.RouteRequest'
      produces:
      - application/json
      responses:
        "200":
          description: Route calculated successfully
          schema:
            allOf:
            - $ref: '#/definitions/geo-service_internal_response.Success'
            - properties:
                data:
                  $ref: '#/definitions/internal_route.RouteResponse'
              type: object
        "400":
          description: Malformed JSON body
          schema:
            $ref: '#/definitions/geo-service_internal_response.Failure'
        "404":
          description: No route found
          schema:
            $ref: '#/definitions/geo-service_internal_response.Failure'
        "422":
          description: Validation error (invalid coordinates or transport mode)
          schema:
            $ref: '#/definitions/geo-service_internal_response.Failure'
        "500":
          description: Internal routing error
          schema:
            $ref: '#/definitions/geo-service_internal_response.Failure'
        "503":
          description: Routing backend unavailable or overloaded
          schema:
            $ref: '#/definitions/geo-service_internal_response.Failure'
        "504":
          description: Routing backend timeout
          schema:
            $ref: '#/definitions/geo-service_internal_response.Failure'
      summary: Calculate a route
      tags:
      - routing
  /route/waypoints:
    post:
      consumes:
      - application/json
      description: |-
        Accepts a waypoint list (≥ 2) and a transport mode.
        Keeps the first waypoint as the start, then reorders the rest
        by nearest-neighbor (Haversine distance) before routing each
        consecutive pair concurrently and stitching the polylines.
      parameters:
      - description: Waypoints + mode
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/internal_route.MultiRouteRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/geo-service_internal_response.Success'
            - properties:
                data:
                  $ref: '#/definitions/internal_route.MultiRouteResponse'
              type: object
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/geo-service_internal_response.Failure'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/geo-service_internal_response.Failure'
        "422":
          description: Unprocessable Entity
          schema:
            $ref: '#/definitions/geo-service_internal_response.Failure'
        "503":
          description: Service Unavailable
          schema:
            $ref: '#/definitions/geo-service_internal_response.Failure'
      summary: Calculate a multi-stop route
      tags:
      - routing
  /ws/shipments/nearby:
    get:
      description: Receives lat/lng over WebSocket. type=passenger queries the Laravel
        shipment table; type=sender searches nearby passengers in Redis.
      responses:
        "101":
          description: Switching Protocols - WebSocket upgrade successful
        "503":
          description: Shipment database is not configured
          schema:
            $ref: '#/definitions/geo-service_internal_response.Failure'
      summary: WebSocket - nearby shipments
      tags:
      - websocket
  /ws/trip/{id}:
    get:
      description: Upgrades the connection to WebSocket and streams real-time `location.updated`
        and `deviation.detected` events for the specified trip via Redis Pub/Sub.
        Send any message to keep the connection alive.
      parameters:
      - description: Trip ID
        in: path
        name: id
        required: true
        type: integer
      responses:
        "101":
          description: Switching Protocols — WebSocket upgrade successful
        "400":
          description: Missing or invalid trip ID
          schema:
            $ref: '#/definitions/geo-service_internal_response.Failure'
      summary: WebSocket — live trip events
      tags:
      - websocket
schemes:
- http
- https
swagger: "2.0"
