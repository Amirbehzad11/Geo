global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    cluster: geo-service
    environment: production

rule_files:
  - /etc/prometheus/alerts.yml

alerting:
  alertmanagers: []

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets: ["localhost:9090"]

  - job_name: geo-service
    metrics_path: /metrics
    scrape_interval: 10s
    static_configs:
      - targets: ["geo-service:8080"]
        labels:
          service: geo-service

  - job_name: otel-collector
    scrape_interval: 15s
    static_configs:
      - targets: ["otel-collector:8889"]
        labels:
          service: otel-collector
